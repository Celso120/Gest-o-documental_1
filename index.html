<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DocManager Pro - Gestão Documental</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Container principal */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: #f8fafc;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 i {
            color: #60a5fa;
            font-size: 1.6rem;
        }

        .logo p {
            font-size: 0.7rem;
            opacity: 0.7;
            color: white;
            margin-top: 4px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .empresa-badge {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-badge {
            background: #f59e0b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
        }

        .btn-icon {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }

        /* Layout principal - 2 colunas */
        .main-layout {
            display: flex;
            flex: 1;
            min-height: 70vh;
        }

        /* Sidebar esquerda - Pastas e Configurações */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Área de pastas em árvore */
        .folders-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Árvore de pastas */
        .folder-tree {
            list-style: none;
            margin-left: 0;
        }

        .tree-node {
            list-style: none;
            margin-left: 0;
        }

        .tree-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }

        .tree-item:hover {
            background: #f1f5f9;
        }

        .tree-item.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .tree-item.active .folder-name {
            color: white;
        }

        .tree-item-content {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .tree-item-content i {
            width: 20px;
            color: #eab308;
        }

        .tree-item.active .tree-item-content i {
            color: white;
        }

        .folder-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
        }

        .tree-actions {
            display: none;
            gap: 4px;
        }

        .tree-item:hover .tree-actions {
            display: flex;
        }

        .tree-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            font-size: 0.7rem;
            color: #64748b;
        }

        .tree-actions button:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .children {
            margin-left: 28px;
        }

        /* Área de configurações */
        .settings-area {
            border-top: 1px solid #e2e8f0;
            padding: 16px 20px;
            background: #f8fafc;
        }

        .settings-toggle {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            color: #1e293b;
            transition: all 0.2s;
        }

        .settings-toggle:hover {
            background: #e2e8f0;
        }

        .settings-panel {
            margin-top: 12px;
            display: none;
        }

        .settings-panel.open {
            display: block;
        }

        .settings-panel input, .settings-panel select {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 0.85rem;
        }

        .settings-panel button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Área de documentos - lado direito */
        .documents-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #f8fafc;
        }

        /* Breadcrumb */
        .breadcrumb {
            background: white;
            padding: 12px 18px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .breadcrumb-item {
            cursor: pointer;
            color: #3b82f6;
            font-weight: 500;
        }

        .breadcrumb-item:hover {
            text-decoration: underline;
        }

        /* Upload area */
        .upload-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .upload-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .upload-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-camera { background: #3b82f6; color: white; }
        .btn-gallery { background: #8b5cf6; color: white; }
        .btn-file { background: #64748b; color: white; }

        /* Tabela de documentos */
        .documents-table {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .table-header {
            display: grid;
            grid-template-columns: 40px 1.5fr 1fr 0.8fr 0.8fr 0.8fr 120px;
            background: #f1f5f9;
            padding: 14px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            border-bottom: 1px solid #e2e8f0;
        }

        .doc-row {
            display: grid;
            grid-template-columns: 40px 1.5fr 1fr 0.8fr 0.8fr 0.8fr 120px;
            padding: 14px 16px;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .doc-row:hover {
            background: #f8fafc;
        }

        .doc-preview {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .doc-name {
            font-weight: 500;
            color: #1e293b;
            word-break: break-word;
        }

        .doc-meta {
            color: #64748b;
            font-size: 0.75rem;
        }

        .doc-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .doc-actions button, .doc-actions a {
            padding: 6px 10px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-share { background: #8b5cf6; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-rename { background: #f59e0b; color: white; }
        .btn-move-doc { background: #3b82f6; color: white; }
        .btn-download { background: #10b981; color: white; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 28px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #1e293b;
        }

        .folder-option {
            padding: 10px 14px;
            margin: 6px 0;
            cursor: pointer;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .folder-option:hover {
            background: #e0e7ff;
        }

        .folder-option.selected {
            background: #3b82f6;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 2000;
            font-size: 0.85rem;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @media (max-width: 1024px) {
            .table-header, .doc-row {
                grid-template-columns: 40px 1.5fr 1fr 0.8fr 0.8fr 0.8fr 120px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 300px;
            }
            .table-header {
                display: none;
            }
            .doc-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    // ==================== MODELO DE DADOS ====================
    function loadData() {
        if (!localStorage.getItem("empresas")) {
            localStorage.setItem("empresas", JSON.stringify(["Matriz"]));
        }
        if (!localStorage.getItem("users")) {
            localStorage.setItem("users", JSON.stringify([
                { username: "admin", password: "admin123", empresa: "Matriz", role: "global_admin" }
            ]));
        }
        if (!localStorage.getItem("pastas")) {
            localStorage.setItem("pastas", JSON.stringify([]));
        }
        if (!localStorage.getItem("documentos")) {
            localStorage.setItem("documentos", JSON.stringify([]));
        }
    }

    function getEmpresas() { return JSON.parse(localStorage.getItem("empresas")); }
    function saveEmpresas(e) { localStorage.setItem("empresas", JSON.stringify(e)); }
    function getUsers() { return JSON.parse(localStorage.getItem("users")); }
    function saveUsers(u) { localStorage.setItem("users", JSON.stringify(u)); }
    function getPastas() { return JSON.parse(localStorage.getItem("pastas")); }
    function savePastas(p) { localStorage.setItem("pastas", JSON.stringify(p)); }
    function getDocumentos() { return JSON.parse(localStorage.getItem("documentos")); }
    function saveDocumentos(d) { localStorage.setItem("documentos", JSON.stringify(d)); }

    let currentUser = null;
    let currentEmpresa = "";
    let currentFolderId = null;
    let draggingFolderId = null;
    let settingsOpen = false;

    function showToast(msg) {
        let existing = document.querySelector(".toast");
        if (existing) existing.remove();
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Funções de pasta
    function getFolderPath(folderId) {
        const pastas = getPastas();
        const path = [];
        let current = pastas.find(p => p.id === folderId);
        while (current) {
            path.unshift(current);
            current = pastas.find(p => p.id === current.parentId);
        }
        return path;
    }

    function isDescendant(ancestorId, descendantId) {
        if (ancestorId === descendantId) return true;
        const pastas = getPastas();
        let currentId = descendantId;
        for (let i = 0; i < 50; i++) {
            const folder = pastas.find(p => p.id === currentId);
            if (!folder || !folder.parentId) return false;
            if (folder.parentId === ancestorId) return true;
            currentId = folder.parentId;
        }
        return false;
    }

    function moveFolder(folderId, newParentId) {
        if (folderId === newParentId) { showToast("Não é possível mover para si mesma"); return false; }
        if (isDescendant(folderId, newParentId)) { showToast("Não é possível mover para dentro de si mesma"); return false; }
        
        const pastas = getPastas();
        const folderIndex = pastas.findIndex(p => p.id === folderId);
        if (folderIndex !== -1) {
            pastas[folderIndex].parentId = newParentId;
            savePastas(pastas);
            showToast("Pasta movida com sucesso!");
            render();
            return true;
        }
        return false;
    }

    function deleteFolderRecursive(folderId) {
        const pastas = getPastas();
        const docs = getDocumentos();
        const subPastas = pastas.filter(p => p.parentId === folderId);
        subPastas.forEach(sp => deleteFolderRecursive(sp.id));
        const newDocs = docs.filter(d => d.pastaId !== folderId);
        const newPastas = pastas.filter(p => p.id !== folderId);
        savePastas(newPastas);
        saveDocumentos(newDocs);
    }

    function createFolder(nome) {
        if (!nome.trim()) { showToast("Digite o nome da pasta"); return; }
        const pastas = getPastas();
        pastas.push({
            id: Date.now(),
            nome: nome.trim(),
            empresa: currentEmpresa,
            parentId: currentFolderId
        });
        savePastas(pastas);
        render();
        showToast(`Pasta "${nome}" criada`);
    }

    // Funções de documento
    function renameDocument(docId, newName) {
        if (!newName.trim()) return;
        const docs = getDocumentos();
        const doc = docs.find(d => d.id === docId);
        if (doc) {
            doc.nome = newName.trim();
            saveDocumentos(docs);
            render();
            showToast("Documento renomeado");
        }
    }

    function moveDocumentToFolder(docId, targetFolderId) {
        const docs = getDocumentos();
        const doc = docs.find(d => d.id === docId);
        if (doc) {
            doc.pastaId = targetFolderId;
            saveDocumentos(docs);
            render();
            showToast("Documento movido");
        }
    }

    async function processFileUpload(file) {
        if (!currentFolderId && currentFolderId !== 0) { showToast("Selecione uma pasta"); return; }
        if (!file) return;
        
        let base64Data = null;
        let fileType = file.type;
        let fileName = file.name;
        let fileSize = file.size;
        
        if (file.type.startsWith("image/")) {
            base64Data = await resizeImage(file, 1200);
            fileType = "image/jpeg";
            fileName = fileName.replace(/\.[^/.]+$/, ".jpg") + "_opt.jpg";
        } else {
            base64Data = await readFileAsBase64(file);
        }
        
        if (base64Data) {
            const docs = getDocumentos();
            docs.push({
                id: Date.now(),
                nome: fileName,
                base64: base64Data,
                tipo: fileType,
                tamanho: fileSize,
                pastaId: currentFolderId,
                empresa: currentEmpresa,
                usuario: currentUser.username,
                data: new Date().toISOString()
            });
            saveDocumentos(docs);
            render();
            showToast("Documento enviado!");
        }
    }

    function readFileAsBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(file);
        });
    }

    function resizeImage(file, maxSize) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    let width = img.width, height = img.height;
                    if (width > height && width > maxSize) {
                        height = (height * maxSize) / width;
                        width = maxSize;
                    } else if (height > maxSize) {
                        width = (width * maxSize) / height;
                        height = maxSize;
                    }
                    const canvas = document.createElement("canvas");
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL("image/jpeg", 0.85));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function formatFileSize(bytes) {
        if (!bytes) return "0 KB";
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
    }

    // Admin
    function isGlobalAdmin() {
        return currentUser && currentUser.role === "global_admin" && currentEmpresa === "Matriz";
    }

    function addEmpresa(nome) {
        if (!isGlobalAdmin()) return;
        let empresas = getEmpresas();
        if (empresas.includes(nome)) { showToast("Empresa já existe"); return; }
        empresas.push(nome);
        saveEmpresas(empresas);
        render();
        showToast(`Empresa ${nome} criada`);
    }

    function addUser(username, password, empresa) {
        if (!isGlobalAdmin()) return;
        let users = getUsers();
        if (users.find(u => u.username === username)) { showToast("Usuário já existe"); return; }
        users.push({ username, password, empresa, role: "user" });
        saveUsers(users);
        render();
        showToast(`Usuário ${username} criado`);
    }

    // Renderização da árvore de pastas
    function renderFolderTree(parentId = null, level = 0) {
        const pastas = getPastas().filter(p => p.empresa === currentEmpresa && p.parentId === parentId);
        let html = '<ul class="folder-tree" style="list-style:none;">';
        
        for (const pasta of pastas) {
            const children = getPastas().filter(p => p.parentId === pasta.id);
            const hasChildren = children.length > 0;
            const isActive = currentFolderId === pasta.id;
            
            html += `
                <li class="tree-node">
                    <div class="tree-item ${isActive ? 'active' : ''}" data-folder-id="${pasta.id}">
                        <div class="tree-item-content">
                            <i class="fas ${hasChildren ? 'fa-folder-open' : 'fa-folder'}"></i>
                            <span class="folder-name">${pasta.nome}</span>
                        </div>
                        <div class="tree-actions">
                            <button class="move-folder-btn" data-id="${pasta.id}" title="Mover"><i class="fas fa-arrows-alt"></i></button>
                            <button class="delete-folder-btn" data-id="${pasta.id}" title="Excluir"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    ${hasChildren ? `<div class="children">${renderFolderTree(pasta.id, level + 1)}</div>` : ''}
                </li>
            `;
        }
        html += '</ul>';
        return html;
    }

    // Modal mover documento
    function showMoveDocModal(docId, docName) {
        const pastas = getPastas().filter(p => p.empresa === currentEmpresa);
        const modal = document.createElement("div");
        modal.className = "modal";
        
        function buildOptions(parentId = null, level = 0) {
            const children = pastas.filter(p => p.parentId === parentId);
            let html = "";
            for (const p of children) {
                html += `<div class="folder-option" data-id="${p.id}" style="padding-left: ${level * 20}px">
                            <i class="fas fa-folder"></i> ${p.nome}
                        </div>`;
                html += buildOptions(p.id, level + 1);
            }
            return html;
        }
        
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-folder-open"></i> Mover: ${docName}</h3>
                <div class="folder-option" data-id="null"><i class="fas fa-home"></i> Raiz da Empresa</div>
                ${buildOptions(null, 1)}
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button id="confirmMoveDocBtn" style="flex:1; background:#10b981;"><i class="fas fa-check"></i> Mover</button>
                    <button id="cancelMoveDocBtn" style="flex:1; background:#ef4444;"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.querySelectorAll(".folder-option").forEach(opt => {
            opt.addEventListener("click", () => {
                document.querySelectorAll(".folder-option").forEach(o => o.classList.remove("selected"));
                opt.classList.add("selected");
            });
        });
        
        document.getElementById("confirmMoveDocBtn")?.addEventListener("click", () => {
            const selected = document.querySelector(".folder-option.selected");
            if (selected) {
                const targetId = selected.getAttribute("data-id") === "null" ? null : parseInt(selected.getAttribute("data-id"));
                moveDocumentToFolder(docId, targetId);
                modal.remove();
            } else {
                showToast("Selecione um destino");
            }
        });
        document.getElementById("cancelMoveDocBtn")?.addEventListener("click", () => modal.remove());
    }

    // Renderização principal
    function render() {
        const app = document.getElementById("app");
        if (!currentUser) {
            const empresas = getEmpresas();
            app.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
                    <div style="background:white; border-radius:40px; padding:48px; max-width:450px; width:100%; box-shadow:0 20px 40px rgba(0,0,0,0.1);">
                        <h2 style="text-align:center; margin-bottom:30px;"><i class="fas fa-folder-open"></i> DocManager Pro</h2>
                        <input type="text" id="loginUser" placeholder="Usuário" style="width:100%; padding:14px; margin-bottom:16px; border-radius:60px; border:1px solid #cbd5e1;">
                        <input type="password" id="loginPass" placeholder="Senha" style="width:100%; padding:14px; margin-bottom:16px; border-radius:60px; border:1px solid #cbd5e1;">
                        <select id="empresaSelect" style="width:100%; padding:14px; margin-bottom:20px; border-radius:60px; border:1px solid #cbd5e1;">
                            <option value="">-- Selecione a empresa --</option>
                            ${empresas.map(e => `<option value="${e}">${e}</option>`).join('')}
                        </select>
                        <button id="btnLogin" style="width:100%; padding:14px; background:#3b82f6; color:white; border:none; border-radius:60px; font-weight:600;"><i class="fas fa-sign-in-alt"></i> Entrar</button>
                    </div>
                </div>
            `;
            document.getElementById("btnLogin")?.addEventListener("click", () => {
                const username = document.getElementById("loginUser").value.trim();
                const password = document.getElementById("loginPass").value.trim();
                const empresa = document.getElementById("empresaSelect").value;
                const user = getUsers().find(u => u.username === username && u.password === password && u.empresa === empresa);
                if (user) {
                    currentUser = user;
                    currentEmpresa = empresa;
                    currentFolderId = null;
                    render();
                } else {
                    showToast("Credenciais inválidas");
                }
            });
            return;
        }

        const pastasRaiz = getPastas().filter(p => p.empresa === currentEmpresa && p.parentId === null);
        const docs = getDocumentos().filter(d => d.pastaId === currentFolderId && d.empresa === currentEmpresa);
        const path = getFolderPath(currentFolderId);
        const isAdmin = isGlobalAdmin();

        app.innerHTML = `
            <div class="app-container">
                <div class="header">
                    <div class="logo">
                        <h1><i class="fas fa-folder-tree"></i> DocManager Pro</h1>
                        <p>Gestão Documental Multi-Empresa</p>
                    </div>
                    <div class="user-info">
                        <div class="empresa-badge"><i class="fas fa-building"></i> ${currentEmpresa}</div>
                        <div class="empresa-badge"><i class="fas fa-user"></i> ${currentUser.username}</div>
                        ${isAdmin ? '<span class="admin-badge"><i class="fas fa-crown"></i> Admin</span>' : ''}
                        <button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i> Sair</button>
                    </div>
                </div>
                
                <div class="main-layout">
                    <!-- Sidebar esquerda -->
                    <div class="sidebar">
                        <div class="folders-area">
                            <div class="section-title">
                                <i class="fas fa-folder-tree"></i> MEUS DOCUMENTOS
                            </div>
                            <div id="folderTreeContainer">
                                ${renderFolderTree()}
                                ${pastasRaiz.length === 0 ? '<div style="text-align:center; color:#94a3b8; padding:20px;"><i class="fas fa-folder-open"></i><p>Nenhuma pasta</p></div>' : ''}
                            </div>
                            <div style="margin-top: 20px;">
                                <div style="display:flex; gap:8px;">
                                    <input type="text" id="newFolderName" placeholder="Nova pasta" style="flex:2; padding:10px 14px; border-radius:60px; border:1px solid #cbd5e1;">
                                    <button id="createFolderBtn" style="background:#3b82f6; border:none; border-radius:60px; padding:0 16px; color:white;"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="settings-area">
                            <button class="settings-toggle" id="settingsToggle">
                                <span><i class="fas fa-cog"></i> Configurações</span>
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="settings-panel" id="settingsPanel">
                                ${isAdmin ? `
                                    <h4 style="margin-bottom:10px;"><i class="fas fa-building"></i> Empresas</h4>
                                    <input type="text" id="newEmpresa" placeholder="Nova empresa">
                                    <button id="addEmpresaBtn"><i class="fas fa-plus"></i> Criar Empresa</button>
                                    <div id="empresasList" style="margin-bottom:16px; display:flex; flex-wrap:wrap; gap:6px;">
                                        ${getEmpresas().map(e => `<span style="background:#e2e8f0; padding:4px 12px; border-radius:40px; font-size:0.7rem;"><i class="fas fa-building"></i> ${e}</span>`).join('')}
                                    </div>
                                    <h4 style="margin-bottom:10px;"><i class="fas fa-users"></i> Usuários</h4>
                                    <input type="text" id="newUser" placeholder="Usuário">
                                    <input type="password" id="newPass" placeholder="Senha">
                                    <select id="userEmpresa">${getEmpresas().map(e => `<option value="${e}">${e}</option>`).join('')}</select>
                                    <button id="addUserBtn"><i class="fas fa-user-plus"></i> Adicionar</button>
                                    <div id="usersList" style="margin-top:12px;"></div>
                                ` : '<p style="color:#64748b; text-align:center;">Apenas administrador pode gerenciar empresas e usuários</p>'}
                            </div>
                        </div>
                    </div>
                    
                    <!-- Área de documentos -->
                    <div class="documents-area">
                        <div class="breadcrumb">
                            <span class="breadcrumb-item" data-id="null"><i class="fas fa-home"></i> Raiz</span>
                            ${path.map(f => `<span><i class="fas fa-chevron-right"></i></span><span class="breadcrumb-item" data-id="${f.id}"><i class="fas fa-folder"></i> ${f.nome}</span>`).join('')}
                        </div>
                        
                        <div class="upload-card">
                            <i class="fas fa-cloud-upload-alt" style="font-size:2rem; color:#3b82f6;"></i>
                            <p style="margin-top:8px;">Envie arquivos para esta pasta</p>
                            <div class="upload-buttons">
                                <button id="cameraBtn" class="btn-camera"><i class="fas fa-camera"></i> Câmera</button>
                                <button id="galleryBtn" class="btn-gallery"><i class="fas fa-images"></i> Galeria</button>
                                <button id="fileBtn" class="btn-file"><i class="fas fa-paperclip"></i> Arquivo</button>
                            </div>
                            <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;">
                        </div>
                        
                        <div class="documents-table">
                            <div class="table-header">
                                <div></div>
                                <div>Nome do arquivo</div>
                                <div>Data criação</div>
                                <div>Usuário</div>
                                <div>Tamanho</div>
                                <div>Tipo</div>
                                <div>Ações</div>
                            </div>
                            <div id="documentsList">
                                ${docs.map(doc => `
                                    <div class="doc-row">
                                        <div class="doc-preview">
                                            ${doc.tipo?.startsWith('image/') ? `<img src="${doc.base64}" style="width:32px; height:32px; border-radius:8px; object-fit:cover;">` : '<i class="fas fa-file-pdf" style="font-size:1.2rem;"></i>'}
                                        </div>
                                        <div class="doc-name">${doc.nome}</div>
                                        <div class="doc-meta">${new Date(doc.data).toLocaleDateString()}</div>
                                        <div class="doc-meta">${doc.usuario || currentUser.username}</div>
                                        <div class="doc-meta">${formatFileSize(doc.tamanho)}</div>
                                        <div class="doc-meta">${doc.tipo?.split('/')[1] || 'arquivo'}</div>
                                        <div class="doc-actions">
                                            <button class="btn-share" data-id="${doc.id}" data-name="${doc.nome}" title="Compartilhar"><i class="fas fa-share-alt"></i></button>
                                            <button class="btn-rename" data-id="${doc.id}" data-name="${doc.nome}" title="Renomear"><i class="fas fa-pen"></i></button>
                                            <button class="btn-move-doc" data-id="${doc.id}" data-name="${doc.nome}" title="Mover"><i class="fas fa-folder-open"></i></button>
                                            <a href="${doc.base64}" download="${doc.nome}" class="btn-download" title="Baixar"><i class="fas fa-download"></i></a>
                                            <button class="btn-delete" data-id="${doc.id}" title="Excluir"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                `).join('')}
                                ${docs.length === 0 ? '<div class="empty-state"><i class="fas fa-file-alt" style="font-size:3rem;"></i><p>Nenhum documento nesta pasta</p><p>Clique em "Câmera", "Galeria" ou "Arquivo" para adicionar</p></div>' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        // Eventos
        document.getElementById("logoutBtn")?.addEventListener("click", () => { currentUser = null; render(); });
        document.getElementById("createFolderBtn")?.addEventListener("click", () => {
            createFolder(document.getElementById("newFolderName").value);
            document.getElementById("newFolderName").value = "";
        });
        
        // Breadcrumb
        document.querySelectorAll(".breadcrumb-item").forEach(el => {
            el.addEventListener("click", () => {
                currentFolderId = el.getAttribute("data-id") === "null" ? null : parseInt(el.getAttribute("data-id"));
                render();
            });
        });
        
        // Clique nas pastas da árvore
        document.querySelectorAll(".tree-item").forEach(el => {
            el.addEventListener("click", (e) => {
                if (e.target.closest('.tree-actions')) return;
                const folderId = parseInt(el.getAttribute("data-folder-id"));
                currentFolderId = folderId;
                render();
            });
        });
        
        // Mover pasta
        document.querySelectorAll(".move-folder-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const folderId = parseInt(btn.getAttribute("data-id"));
                showMoveFolderModal(folderId);
            });
        });
        
        // Excluir pasta
        document.querySelectorAll(".delete-folder-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const folderId = parseInt(btn.getAttribute("data-id"));
                if (confirm("Excluir pasta e todo seu conteúdo?")) {
                    deleteFolderRecursive(folderId);
                    if (currentFolderId === folderId) currentFolderId = null;
                    render();
                }
            });
        });
        
        // Ações de documentos
        document.querySelectorAll(".btn-delete").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = parseInt(btn.getAttribute("data-id"));
                if (confirm("Excluir documento?")) {
                    const newDocs = getDocumentos().filter(d => d.id !== id);
                    saveDocumentos(newDocs);
                    render();
                }
            });
        });
        
        document.querySelectorAll(".btn-rename").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = parseInt(btn.getAttribute("data-id"));
                const currentName = btn.getAttribute("data-name");
                const newName = prompt("Novo nome do arquivo:", currentName);
                if (newName && newName.trim()) {
                    renameDocument(id, newName);
                }
            });
        });
        
        document.querySelectorAll(".btn-move-doc").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = parseInt(btn.getAttribute("data-id"));
                const name = btn.getAttribute("data-name");
                showMoveDocModal(id, name);
            });
        });
        
        document.querySelectorAll(".btn-share").forEach(btn => {
            btn.addEventListener("click", () => {
                showToast("Funcionalidade de compartilhamento em desenvolvimento");
            });
        });
        
        // Upload
        const fileInput = document.getElementById("fileInput");
        document.getElementById("cameraBtn")?.addEventListener("click", () => {
            fileInput.setAttribute("capture", "environment");
            fileInput.setAttribute("accept", "image/*");
            fileInput.click();
        });
        document.getElementById("galleryBtn")?.addEventListener("click", () => {
            fileInput.removeAttribute("capture");
            fileInput.setAttribute("accept", "image/*");
            fileInput.click();
        });
        document.getElementById("fileBtn")?.addEventListener("click", () => {
            fileInput.removeAttribute("capture");
            fileInput.setAttribute("accept", "image/*,application/pdf");
            fileInput.click();
        });
        fileInput?.addEventListener("change", async (e) => {
            if (fileInput.files.length) {
                await processFileUpload(fileInput.files[0]);
                fileInput.value = "";
            }
        });
        
        // Settings toggle
        const settingsToggle = document.getElementById("settingsToggle");
        const settingsPanel = document.getElementById("settingsPanel");
        settingsToggle?.addEventListener("click", () => {
            settingsOpen = !settingsOpen;
            if (settingsOpen) {
                settingsPanel.classList.add("open");
                settingsToggle.querySelector(".fa-chevron-down").style.transform = "rotate(180deg)";
            } else {
                settingsPanel.classList.remove("open");
                settingsToggle.querySelector(".fa-chevron-down").style.transform = "rotate(0deg)";
            }
        });
        
        // Admin
        if (isAdmin) {
            document.getElementById("addEmpresaBtn")?.addEventListener("click", () => {
                addEmpresa(document.getElementById("newEmpresa").value);
                document.getElementById("newEmpresa").value = "";
            });
            document.getElementById("addUserBtn")?.addEventListener("click", () => {
                addUser(document.getElementById("newUser").value, document.getElementById("newPass").value, document.getElementById("userEmpresa").value);
                document.getElementById("newUser").value = "";
                document.getElementById("newPass").value = "";
            });
            const users = getUsers();
            const usersList = document.getElementById("usersList");
            if (usersList) {
                usersList.innerHTML = users.map(u => `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:8px 12px; border-radius:40px; margin-bottom:6px;">
                        <span style="font-size:0.8rem;"><i class="fas fa-user"></i> ${u.username} (${u.empresa})</span>
                        ${u.username !== 'admin' ? `<button class="delete-user-btn" data-user="${u.username}" style="background:#ef4444; border:none; padding:4px 10px; border-radius:40px; color:white; cursor:pointer;"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                `).join('');
                document.querySelectorAll(".delete-user-btn").forEach(btn => {
                    btn.addEventListener("click", () => {
                        let newUsers = getUsers().filter(u => u.username !== btn.getAttribute("data-user"));
                        saveUsers(newUsers);
                        render();
                    });
                });
            }
        }
    }
    
    function showMoveFolderModal(folderId) {
        const pastas = getPastas().filter(p => p.empresa === currentEmpresa && p.id !== folderId);
        const modal = document.createElement("div");
        modal.className = "modal";
        
        function buildOptions(parentId = null, level = 0) {
            const children = pastas.filter(p => p.parentId === parentId);
            let html = "";
            for (const p of children) {
                html += `<div class="folder-option" data-id="${p.id}" style="padding-left: ${level * 20}px">
                            <i class="fas fa-folder"></i> ${p.nome}
                        </div>`;
                html += buildOptions(p.id, level + 1);
            }
            return html;
        }
        
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-arrows-alt"></i> Mover Pasta</h3>
                <div class="folder-option" data-id="null"><i class="fas fa-home"></i> Raiz da Empresa</div>
                ${buildOptions(null, 1)}
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button id="confirmMoveFolderBtn" style="flex:1; background:#10b981;"><i class="fas fa-check"></i> Mover</button>
                    <button id="cancelMoveFolderBtn" style="flex:1; background:#ef4444;"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.querySelectorAll(".folder-option").forEach(opt => {
            opt.addEventListener("click", () => {
                document.querySelectorAll(".folder-option").forEach(o => o.classList.remove("selected"));
                opt.classList.add("selected");
            });
        });
        
        document.getElementById("confirmMoveFolderBtn")?.addEventListener("click", () => {
            const selected = document.querySelector(".folder-option.selected");
            if (selected) {
                const targetId = selected.getAttribute("data-id") === "null" ? null : parseInt(selected.getAttribute("data-id"));
                moveFolder(folderId, targetId);
                modal.remove();
            } else {
                showToast("Selecione um destino");
            }
        });
        document.getElementById("cancelMoveFolderBtn")?.addEventListener("click", () => modal.remove());
    }
    
    loadData();
    render();
</script>
</body>
</html>
